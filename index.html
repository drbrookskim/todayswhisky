                setLoading(true);
                const avgBio = (bio.physical + bio.emotional + bio.intellectual) / 3;
                let abvTarget = "Standard"; if (avgBio > 65) abvTarget = "High"; if (avgBio < 35) abvTarget = "Low"; 
                const range = PRICE_RANGES.find(r => r.id === price);
                let available = SPIRITS_DB.filter(w => w.priceKrw >= range.min && w.priceKrw <= range.max);
                if (available.length === 0) available = SPIRITS_DB;

                const scored = available.map(w => {
                    let s = 0;
                    if (w.priceKrw < range.min || w.priceKrw > range.max) s -= 5000;
                    if (w.archetype && w.archetype.includes(mbti)) s += 300;
                    mbti.split('').forEach(trait => { (MBTI_TRAIT_PREFS[trait]||[]).forEach(tag => { if (w.tags.includes(tag)) s += 60; }); });
                    moods.forEach(mid => { const mD = MOODS.find(m => m.id === mid); w.tags.forEach(tag => { if (mD.flavorProfile.includes(tag)) s += 150; }); });
                    if (abvTarget === "High") s += (w.abv >= 50 ? 200 : -100); else if (abvTarget === "Low") s += (w.abv <= 43 ? 200 : -150); else s += (w.abv >= 40 && w.abv < 50 ? 100 : 0);
                    return { ...getWhiskyDetails(w), score: s };
                }).sort((a, b) => b.score - a.score);

                setTimeout(() => {
                    setResult({ whiskey: scored[0], blendedMood: getBlendedMood(moods, lang) });
                    setCStep(4); setLoading(false);
                }, 1500);
            };

            if (loading) return <div className="py-20 text-center"><Icon name="loader-2" className="w-10 h-10 text-teal-500 animate-spin mx-auto mb-4"/><p className="text-slate-400">Curating...</p></div>;

            if (cStep === 1) return (
                <div className="space-y-6 animate-in fade-in slide-in-from-right-4">
                    <header>
                        <h2 className="text-2xl font-extrabold text-white">{t.step2_title}</h2>
                        <p className="text-slate-400 text-sm mt-1">{t.step2_sub}</p>
                    </header>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {MOODS.map(m => (
                            <button key={m.id} onClick={() => setMoods(p => p.includes(m.id) ? p.filter(id=>id!==m.id) : p.length<3 && !MOODS.find(x=>x.id===m.id).conflicts.some(c=>p.includes(c)) ? [...p, m.id] : p)}
                                className={`rounded-2xl border flex items-stretch text-left min-h-[80px] transition-all ${moods.includes(m.id) ? 'border-teal-500 bg-teal-900/40 shadow-lg' : 'border-slate-700 bg-slate-800'}`}>
                                <div className={`w-16 shrink-0 flex items-center justify-center ${moods.includes(m.id) ? 'bg-teal-800/60' : 'bg-slate-700/50'}`}><span className="text-3xl">{m.emoji}</span></div>
                                <div className="flex-1 p-3 flex items-center"><span className={`text-sm font-bold leading-snug break-keep ${moods.includes(m.id)?'text-teal-100':'text-slate-400'}`}>{m.expr[lang]}</span></div>
                            </button>
                        ))}
                    </div>
                    <button onClick={() => setCStep(2)} disabled={moods.length===0} className={`w-full py-4 rounded-2xl bg-teal-600 text-white font-bold text-lg ${moods.length===0?'opacity-50':''}`}>{t.step_next}</button>
                </div>
            );

            if (cStep === 2) {
                const bM = getBlendedMood(moods, lang);
                return (
                    <div className="space-y-6 animate-in fade-in slide-in-from-right-4">
                        <header className="text-center"><h2 className="text-2xl font-extrabold text-white">{t.step3_title}</h2></header>
                        <GlassCard className="flex flex-col items-center gap-4 p-8 w-full mt-6">
                            <div className="text-[5rem] drop-shadow-2xl mb-2">{bM.emoji}</div>
                            <span className="text-3xl font-black text-teal-300 text-center">{bM.label}</span>
                            <span className="text-sm text-slate-300 text-center font-medium mt-2">{bM.desc}</span>
                            <div className="mt-4 pt-5 border-t border-white/10 w-full text-center"><span className="text-base font-extrabold text-teal-400">{bM.invite}</span></div>
                        </GlassCard>
                        <div className="flex gap-3 mt-8">
                            <button onClick={()=>setCStep(1)} className="flex-1 py-4 border border-slate-700 rounded-2xl text-slate-300 font-bold">뒤로</button>
                            <button onClick={()=>setCStep(3)} className="flex-1 py-4 bg-teal-600 rounded-2xl text-white font-bold">계속하기</button>
                        </div>
                    </div>
                );
            }

            if (cStep === 3) return (
                <div className="space-y-6 animate-in fade-in slide-in-from-right-4">
                    <header><h2 className="text-2xl font-extrabold text-white">{t.step4_title}</h2></header>
                    <div className="grid gap-3">
                        {PRICE_RANGES.map(r => (
                            <button key={r.id} onClick={()=>setPrice(r.id)} className={`p-5 rounded-2xl border flex items-center justify-between ${price===r.id?'border-teal-500 bg-teal-900/40':'border-slate-700 bg-slate-800'}`}>
                                <div className="flex items-center gap-3">
                                    <div className={`p-2 rounded-full ${price===r.id?'bg-teal-800 text-teal-200':'bg-slate-700 text-slate-400'}`}><Icon name="credit-card" className="w-5 h-5"/></div>
                                    <span className={`font-bold text-lg ${price===r.id?'text-teal-100':'text-slate-400'}`}>{r.label[lang]}</span>
                                </div>
                                {price===r.id && <Icon name="check" className="text-teal-400"/>}
                            </button>
                        ))}
                    </div>
                    <div className="flex gap-3 mt-8">
                        <button onClick={()=>setCStep(2)} className="flex-1 py-4 border border-slate-700 rounded-2xl text-slate-300 font-bold">뒤로</button>
                        <button onClick={run} className="flex-[2] py-4 bg-[#C8962A] rounded-2xl text-white font-bold shadow-lg shadow-[#C8962A]/20">{t.run_btn}</button>
                    </div>
                </div>
            );

            if (cStep === 4 && result) return (
                <div className="space-y-6 animate-in zoom-in-95 duration-500">
                    {showShare && <ShareCard result={result} mbti={mbti} lang={lang} onClose={() => setShowShare(false)} />}
                    <div className="flex justify-between items-center px-2">
                        <button onClick={() => setCStep(1)} className="text-teal-500 text-sm font-bold flex items-center gap-1"><Icon name="rotate-ccw" className="w-4 h-4"/> 다시 큐레이션</button>
                        <button onClick={() => setShowShare(true)} className="text-teal-500 text-sm font-bold flex items-center gap-1"><Icon name="share" className="w-4 h-4"/> 공유하기</button>
                    </div>
                    <div className="text-center relative pt-4">
                        <div className="mt-4 flex justify-center min-h-[160px]"><PourAnimation color={result.whiskey.color} /></div>
                        <h2 className="text-3xl font-black mt-4 text-white playfair">{lang==='ko'?result.whiskey.name:result.whiskey.nameEn}</h2>
                        <p className="text-slate-400 font-medium mt-1 text-sm">{result.whiskey.style} · {result.whiskey.abv}%</p>
                    </div>
                    <div className="flex justify-center flex-wrap gap-2 px-2">
                        {result.whiskey.tags.map(tag => <span key={tag} className="px-3 py-1 bg-white/5 border border-white/10 text-teal-400 rounded-full text-xs font-bold uppercase">#{tag}</span>)}
                    </div>
                    <GlassCard className="p-6">
                        <h3 className="text-xs font-bold text-teal-500 mb-3 uppercase tracking-widest">Tasting Notes</h3>
                        <p className="text-sm text-slate-300 leading-relaxed">{lang==='ko'?result.whiskey.desc:result.whiskey.descEn}</p>
                    </GlassCard>
                    <GlassCard className="p-6">
                        <h3 className="text-xs font-bold text-teal-500 mb-4 uppercase tracking-widest">Flavor Profile</h3>
                        <FlavorBars flavor={result.whiskey.flavor} lang={lang} />
                    </GlassCard>
                </div>
            );
        };

        const ProfileTab = ({ mbti, lang, onReset, setLang }) => {
            const group = MBTI_GROUPS.find(g => g.types.includes(mbti));
            return (
                <div className="space-y-6 animate-in fade-in">
                    <h2 className="text-2xl font-extrabold text-white mb-6">{lang==='en'?'Profile':'프로필'}</h2>
                    <GlassCard className="p-6 flex flex-col items-center text-center">
                        <div className="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mb-4 border border-slate-700 text-3xl">👤</div>
                        <span className={`text-sm font-bold uppercase tracking-widest ${group.color} mb-1`}>{group.label[lang]}</span>
                        <h3 className="text-4xl font-black text-white playfair tracking-widest">{mbti}</h3>
                    </GlassCard>
                    <div className="space-y-3 pt-6">
                        <button onClick={() => setLang(l => l==='ko'?'en':'ko')} className="w-full py-4 rounded-2xl bg-slate-800 border border-slate-700 text-white font-bold flex justify-between px-6 items-center">
                            <span>{lang==='en'?'Language':'언어 설정'}</span> <span className="text-teal-400">{lang==='ko'?'한국어':'English'}</span>
                        </button>
                        <button onClick={onReset} className="w-full py-4 rounded-2xl border border-red-500/30 text-red-400 font-bold hover:bg-red-500/10 transition-colors">
                            {lang==='en'?'Retake MBTI Quiz':'MBTI 퀴즈 다시하기 (초기화)'}
                        </button>
                    </div>
                </div>
            );
        };

        // --- 5. Main App Container ---

        const App = () => {
            const [lang, setLang] = useState('ko'); 
            const [appState, setAppState] = useState('splash'); // splash, onboarding, quiz, direct, main
            const [activeTab, setActiveTab] = useState('home'); // home, curate, profile
            const [mbti, setMbti] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem('user_mbti');
                setTimeout(() => {
                    if (saved) { setMbti(saved); setAppState('main'); } 
                    else { setAppState('onboarding'); }
                }, 2000);
            }, []);

            const handleMbtiComplete = (res) => {
                setMbti(res); localStorage.setItem('user_mbti', res);
                setAppState('main'); setActiveTab('home');
            };

            const handleReset = () => {
                localStorage.removeItem('user_mbti'); setMbti(null); setAppState('onboarding');
            };

            return (
                <div className="app-container">
                    {appState === 'splash' && <Splash onFinish={()=>{}} />}
                    {appState === 'onboarding' && <Onboarding onStartQuiz={()=>setAppState('quiz')} onDirectSelect={()=>setAppState('direct')} lang={lang} setLang={setLang} />}
                    {appState === 'quiz' && <Quiz onComplete={handleMbtiComplete} lang={lang} />}
                    {appState === 'direct' && <DirectSelect onComplete={handleMbtiComplete} lang={lang} />}
                    
                    {appState === 'main' && (
                        <>
                            <div className="content-area">
                                {activeTab === 'home' && <HomeTab mbti={mbti} lang={lang} />}
                                {activeTab === 'curate' && <CurateTab mbti={mbti} lang={lang} bio={calculateBiorhythm(mbti)} />}
                                {activeTab === 'profile' && <ProfileTab mbti={mbti} lang={lang} onReset={handleReset} setLang={setLang} />}
                            </div>
                            <nav className="bottom-nav">
                                <button onClick={()=>setActiveTab('home')} className={`nav-item ${activeTab==='home'?'active':''}`}>
                                    <Icon name="home" className="w-6 h-6" />
                                    <span className="text-[10px] font-bold">{TEXT[lang].tab_home}</span>
                                </button>
                                <button onClick={()=>setActiveTab('curate')} className={`nav-item ${activeTab==='curate'?'active':''}`}>
                                    <Icon name="sparkles" className="w-6 h-6" />
                                    <span className="text-[10px] font-bold">{TEXT[lang].tab_curate}</span>
                                </button>
                                <button onClick={()=>setActiveTab('profile')} className={`nav-item ${activeTab==='profile'?'active':''}`}>
                                    <Icon name="user" className="w-6 h-6" />
                                    <span className="text-[10px] font-bold">{TEXT[lang].tab_profile}</span>
                                </button>
                            </nav>
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
