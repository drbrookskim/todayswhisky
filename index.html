            const [fill, setFill] = useState(0);

            const rafRef = useRef(null);

            useEffect(() => {
                let start = null;
                const step = (ts) => {
                    if (!start) start = ts;
                    const p = Math.min((ts - start) / 1400, 1);
                    setFill((1 - Math.pow(1 - p, 3)) * 62); // ease out cubic
                    if (p < 1) rafRef.current = requestAnimationFrame(step);
                    else { setStream(false); setTimeout(() => onComplete?.(), 400); }
                };
                rafRef.current = requestAnimationFrame(step);
                return () => cancelAnimationFrame(rafRef.current);
            }, [color]);

            const liquidY = 93 - (fill / 100) * 75;

        const WaveChart = ({ bio, lang }) => {
            const cycles = {
                physical: { v: bio.physical/100 * 2 - 1, color:'#0d9488', labelKo:'신체', labelEn:'Physical' },
                emotional: { v: bio.emotional/100 * 2 - 1, color:'#f59e0b', labelKo:'감성', labelEn:'Emotional' },
                intellectual: { v: bio.intellectual/100 * 2 - 1, color:'#3b82f6', labelKo:'지성', labelEn:'Intellectual' },
            };
            const W = 320, H = 80, DAYS = 21, START_DAY = -14;
            const x = (i) => (i / (DAYS-1)) * W;
            const y = (v) => H/2 - v * (H/2 - 8);

            const wavePath = (vTarget) => {
                const pts = Array.from({length:DAYS}, (_,i) => {
                    const progress = i / (DAYS-1); 
                    const v = Math.sin((progress * Math.PI * 4) + Math.asin(vTarget));
                    return [x(i), y(v)];
                });
                return 'M ' + pts.map(p=>p.join(',')).join(' L ');
            };

            return (
                <div>
                    <div className="bg-black/20 rounded-2xl p-4 mb-4 border border-white/5 relative overflow-hidden">

                            <line x1={x(14)} y1="0" x2={x(14)} y2={H} stroke="rgba(255,255,255,0.2)" strokeWidth="1.5" strokeDasharray="4,3"/>
                            {Object.entries(cycles).map(([k,c]) => (
                                <path key={k} d={wavePath(c.v)} fill="none" stroke={c.color} strokeWidth="2" opacity="0.85"/>
                            ))}
                            {Object.entries(cycles).map(([k,c]) => (
                                <circle key={`dot-${k}`} cx={x(14)} cy={y(c.v)} r="4" fill={c.color} stroke="#1e293b" strokeWidth="2"/>
                            ))}
                        </svg>
                    </div>
                    <div className="flex gap-2">
                        {Object.entries(cycles).map(([k,c]) => {
                            const pct = Math.round((c.v + 1) / 2 * 100);
                            return (
                                <div key={k} className="flex-1 p-2 rounded-xl text-center border border-white/5 bg-white/5">
                                    <div style={{ color: c.color }} className="text-[10px] font-bold mb-1">{lang==='en' ? c.labelEn : c.labelKo}</div>
                                    <div className="text-xl font-black text-slate-100 playfair">{pct}</div>
                                </div>
                            );
                        })}

            );

        const ShareCard = ({ result, mbti, lang, onClose }) => {
            const canvasRef = useRef(null);
            const [ready, setReady] = useState(false);
            const [copied, setCopied] = useState(false);
            const w = result.whiskey;

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const W = 800, H = 1000;
                canvas.width = W; canvas.height = H;

                // Bg
                const bgGrad = ctx.createRadialGradient(W/2, H*0.2, 0, W/2, H*0.2, W*0.8);
                bgGrad.addColorStop(0, '#1e293b'); bgGrad.addColorStop(1, '#0f172a');
                ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);

                // Glow
                const glowGrad = ctx.createRadialGradient(W/2, 200, 0, W/2, 200, 350);
                glowGrad.addColorStop(0, w.color + '50'); glowGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = glowGrad; ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = '#0d9488'; ctx.fillRect(0, 0, W, 6);
                
                ctx.fillStyle = '#0d9488'; ctx.font = '500 20px sans-serif'; ctx.letterSpacing = '8px';
                ctx.fillText('WHISKY × MBTI', W/2 - ctx.measureText('WHISKY × MBTI').width/2 - 8, 55);

                ctx.fillStyle = '#14b8a6'; ctx.font = 'bold 110px serif'; ctx.textAlign = 'center';
                ctx.fillText(mbti, W/2, 220);

                ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = '400 30px sans-serif';
                ctx.fillText(result.blendedMood.label, W/2, 275);

                ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(W*0.2, 320); ctx.lineTo(W*0.8, 320); ctx.stroke();

                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 46px serif';
                ctx.fillText(lang==='ko'?w.name:w.nameEn, W/2, 400);

                ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '300 24px sans-serif';
                ctx.fillText(`${w.style}  ·  ${w.abv}%`, W/2, 440);

                let tagX = W/2 - (w.tags.length * 130)/2 + 65;
                w.tags.forEach(tag => {
                    const tw = ctx.measureText('#' + tag).width + 30;
                    ctx.fillStyle = 'rgba(20,184,166,0.15)';
                    ctx.beginPath(); ctx.roundRect(tagX - tw/2, 470, tw, 36, 18); ctx.fill();
                    ctx.fillStyle = '#14b8a6'; ctx.font = '400 20px sans-serif';
                    ctx.fillText('#' + tag, tagX, 495);
                    tagX += 140;
                });

                ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '300 22px sans-serif';
                const desc = lang==='en' ? w.descEn : w.desc;
                const words = desc.split(' '); let line = '', curY = 590;
                for(let i=0; i<words.length; i++) {
                    if(ctx.measureText(line + words[i] + ' ').width > W*0.75) { ctx.fillText(line, W/2, curY); line = words[i] + ' '; curY += 34; } 
                    else { line += words[i] + ' '; }
                }
                ctx.fillText(line, W/2, curY);

                const barStartY = 760, barW = W * 0.6, barStartX = (W - barW) / 2;
                Object.entries(w.flavor).forEach(([k, v], i) => {
                    const y = barStartY + i * 32;
                    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '300 18px sans-serif'; ctx.textAlign = 'left';
                    ctx.fillText(k.toUpperCase(), barStartX, y+14);
                    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.roundRect(barStartX + 120, y, barW - 120, 10, 5); ctx.fill();
                    const fillGrad = ctx.createLinearGradient(barStartX+120, y, barStartX+120+(barW-120)*v/100, y);
                    fillGrad.addColorStop(0, '#0d9488'); fillGrad.addColorStop(1, '#2dd4bf');
                    ctx.fillStyle = fillGrad; ctx.beginPath(); ctx.roundRect(barStartX + 120, y, (barW - 120) * v / 100, 10, 5); ctx.fill();
                });

                ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '300 16px sans-serif';
                ctx.fillText('Today\'s Whiskey Curation', W/2, 950);
                setReady(true);
            }, [result, lang]);

                const posCount = moodIds.filter(id => ['delight', 'joy', 'anticipation', 'surprise', 'trust'].includes(id)).length;

                else if (negCount > 0 && posCount === 0) return { emoji: "🌧️", label: currentLang === 'ko' ? "폭풍우 치는 내면" : "Stormy Inner World", desc: currentLang === 'ko' ? "여러 부정적인 감정들이 복잡하게 얽혀 마음속에 무거운 비바람이 몰아치고 있습니다. 쉼이 필요합니다." : "Multiple negative emotions are tangled.", invite: currentLang === 'ko' ? "힘들었던 오늘, 당신을 조용히 달래줄 한 잔을 찾아드릴까요?" : "A tough day today, shall we find a drink to quietly comfort you?" };
                else return { emoji: "🌓", label: currentLang === 'ko' ? "복잡미묘한 여운" : "Bittersweet Resonance", desc: currentLang === 'ko' ? "빛과 그림자가 공존하듯, 완전히 상반된 감정들이 교차하며 당신에게 깊고 복잡한 여운을 남기는 하루입니다." : "Like light and shadow coexisting, completely contrasting emotions intersect.", invite: currentLang === 'ko' ? "이 오묘한 감정선에 깊이를 더해줄 한 잔, 같이 골라볼까요?" : "Shall we pick a drink to add depth to these subtle emotions?" };
            };

            const runCuration = () => {
                setIsLoading(true); setPoured(false);
                const mbtiHash = mbti.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
                const seed = baseDate.getTime() + (mbtiHash * 100000);
                const calculate = (period) => Math.sin((seed / 86400000 / period) * 2 * Math.PI);
                const bio = { physical: Math.round(calculate(23) * 50 + 50), emotional: Math.round(calculate(28) * 50 + 50), intellectual: Math.round(calculate(33) * 50 + 50) };
                const avgBio = (bio.physical + bio.emotional + bio.intellectual) / 3;
                let abvTarget = "Standard"; if (avgBio > 65) abvTarget = "High"; if (avgBio < 35) abvTarget = "Low"; 

                const priceRange = PRICE_RANGES.find(r => r.id === selectedPriceRange);
                let availableWhiskies = SPIRITS_DB.filter(w => w.priceKrw >= priceRange.min && w.priceKrw <= priceRange.max);
                if (availableWhiskies.length === 0) availableWhiskies = SPIRITS_DB;

                const scoredWhiskeys = availableWhiskies.map(w => {

                    if (w.archetype && w.archetype.includes(mbti)) score += 300;

                    mbti.split('').forEach(trait => {
                        const preferredTags = MBTI_TRAIT_PREFS[trait] || [];
                        w.tags.forEach(tag => { if (preferredTags.includes(tag)) score += 60; });

                    selectedMoods.forEach(moodId => {
                        const moodData = MOODS.find(m => m.id === moodId);
                        w.tags.forEach(tag => { if (moodData.flavorProfile.includes(tag)) score += 150; });

                    else { if (w.abv >= 40 && w.abv < 50) score += 100; }

                    return { ...getWhiskyDetails(w), totalScore: score };
                }).sort((a, b) => b.totalScore - a.totalScore);

                    )}

                    {step === 5 && result && (
                        <div className="w-full space-y-6 animate-in zoom-in-95 duration-700">
                            {showShare && <ShareCard result={result} mbti={mbti} lang={lang} onClose={() => setShowShare(false)} />}
                            
                            <div className="flex justify-between items-center px-2">
                                <button onClick={() => setStep(1)} className="text-teal-500 text-sm font-bold flex items-center gap-1"><Icon name="rotate-ccw" className="w-4 h-4"/> 다시하기</button>
                                <button onClick={() => setShowShare(true)} className="text-teal-500 text-sm font-bold flex items-center gap-1"><Icon name="share" className="w-4 h-4"/> 공유하기</button>
                            </div>

                            <div className="text-center relative pt-4">
                                <div className="absolute top-0 w-full flex justify-center z-10">
                                    <div className="bg-teal-900/50 border border-teal-500/30 rounded-full px-4 py-1.5 flex items-center gap-2">
                                        <span className="font-bold text-teal-300 playfair text-lg tracking-widest">{mbti}</span>
                                        <span className="text-slate-300 text-xs">· {result.blendedMood.label}</span>
                                    </div>
                                </div>
                                <div className="mt-8 flex justify-center min-h-[160px]">
                                    {!poured ? <PourAnimation color={result.whiskey.color} onComplete={() => setPoured(true)} /> : (
                                        <div className="relative animate-in fade-in duration-1000">
                                            <svg width="180" height="150" viewBox="0 0 180 150" fill="none">
                                                <path d="M25 14 L22 93 Q22 103 35 103 L145 103 Q158 103 158 93 L155 14 Z" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.15)" strokeWidth="1.5"/>
                                                <g style={{clipPath:"path('M25 14 L22 93 Q22 103 35 103 L145 103 Q158 103 158 93 L155 14 Z')"}}>
                                                    <rect x="22" y="55" width="136" height="48" fill={result.whiskey.color} opacity="0.8"/>
                                                </g>
                                            </svg>
                                            <div className="absolute inset-[-20px] pointer-events-none" style={{background: `radial-gradient(circle at 50% 75%, ${result.whiskey.color}40 0%, transparent 60%)`}}></div>
                                        </div>
                                    )}
                                </div>
                                <h2 className="text-[2rem] font-black mt-2 text-white playfair leading-tight">{lang === 'ko' ? result.whiskey.name : result.whiskey.nameEn}</h2>
                                <p className="text-slate-400 font-medium mt-1 text-sm">{result.whiskey.style} · {result.whiskey.abv}%</p>
                            </div>

                            <div className="flex justify-center flex-wrap gap-2 px-4">
                                {result.whiskey.tags.map(tag => <span key={tag} className="px-3 py-1 bg-white/5 border border-white/10 text-teal-400 rounded-full text-xs font-bold uppercase tracking-wide">#{tag}</span>)}
                            </div>

                            <GlassCard className="p-6">
                                <h3 className="text-xs font-bold text-teal-500 tracking-widest mb-3 uppercase">Tasting Notes</h3>
                                <p className="text-sm text-slate-300 leading-relaxed font-medium">{lang === 'ko' ? result.whiskey.desc : result.whiskey.descEn}</p>
                            </GlassCard>

                            <GlassCard className="p-6">
                                <h3 className="text-xs font-bold text-teal-500 tracking-widest mb-4 uppercase">Flavor Profile</h3>
                                <FlavorBars flavor={result.whiskey.flavor} lang={lang} />
                            </GlassCard>

                            <GlassCard className="p-6">
                                <h3 className="text-xs font-bold text-teal-500 tracking-widest mb-4 uppercase">Today's Biorhythm</h3>
                                <WaveChart bio={result.biorhythm} lang={lang} />
                            </GlassCard>

                            <button onClick={() => window.open(`https://search.naver.com/search.naver?query=${encodeURIComponent(result.whiskey.name + ' 가격')}`)} className="w-full py-4 rounded-2xl bg-[#C8962A] text-white font-bold text-lg shadow-xl shadow-[#C8962A]/20 flex items-center justify-center gap-2">
                                <Icon name="search" /> 가격 및 구매처 검색
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
