            { name: "맥캘란 12년 더블 캐스크", nameEn: "Macallan 12 Year Double Cask", age: "12년", style: "Double Cask", tags: ["honey", "vanilla", "oak", "balanced", "smooth"], abv: 40, archetype: ["ESTJ", "ISFJ", "ENFJ"], priceKrw: 120000, priceRangeKrw: "110,000원 ~ 135,000원", priceUsd: 85, variants: [{vol: "700ml", price: 120000}], desc: "노즈: 아메리칸 오크의 꿀과 바닐라, 유러피안 오크의 스파이스가 조화롭게 피어난다.\n\n팔레트: 두 오크통의 조화가 만든 균형 잡힌 단맛과 은은한 스파이스가 입안 가득 퍼진다.\n\n피니시: 중간에서 긴 길이로 꿀과 스파이스의 여운이 부드럽게 이어진다.", descEn: "Nose: American oak honey and vanilla meet European oak spice.\n\nPalate: The harmony of two oaks brings balanced sweetness with gentle spice.\n\nFinish: Medium-to-long, a smooth echo of honey and spice.", country: { ko: "스코틀랜드(스페이사이드)", en: "Scotland (Speyside)" }, distillery: { ko: "맥캘란 증류소 (에드링턴)", en: "The Macallan Distillery (Edrington)" } },

            { name: "조니워커 블루라벨", nameEn: "Johnnie Walker Blue Label", age: "NAS", style: "Premium Blend", tags: ["balanced", "smoke", "velvet", "rich"], abv: 40, archetype: ["ENTJ", "ENFJ"], priceKrw: 240000, priceRangeKrw: "240,000원 ~ 310,000원", priceUsd: 200, variants: [{vol: "750ml", price: 240000}], desc: "노즈: 벨벳처럼 부드러운 스모키함과 과일향, 우아한 단맛이 고급스럽게 피어난다.\n\n팔레트: 1만 개 중 하나의 오크통이 만든 비단결 같은 목넘김과 균형 잡힌 풍미가 입안 가득 퍼진다.\n\n피니시: 길고 우아하며 스모키함과 단맛의 여운이 부드럽게 지속된다.", descEn: "Nose: Velvet-smooth smoke and fruit with elegant sweetness.\n\nPalate: One-in-ten-thousand casks yield a silky texture and balanced flavor.\n\nFinish: Long and elegant, a smooth echo of smoke and sweetness.", country: { ko: "스코틀랜드", en: "Scotland" }, distillery: { ko: "디아지오", en: "Diageo" } },
            { name: "야마자키 12년", nameEn: "Yamazaki 12 Year", age: "12년", style: "Japanese Single Malt", tags: ["floral", "fruit", "spice", "mizunara"], abv: 43, archetype: ["ISFJ", "ISTJ"], priceKrw: 290000, priceRangeKrw: "290,000원 ~ 450,000원", priceUsd: 180, variants: [{vol: "700ml", price: 290000}], desc: "노즈: 미즈나라 오크의 신비로운 향나무향과 과일향, 스파이스가 우아하게 어우러진다.\n\n팔레트: 일본 위스키 특유의 섬세함과 미즈나라 오크의 독특한 풍미가 조화롭게 퍼진다.\n\n피니시: 길고 신비로우며 향나무와 스파이스의 여운이 은은하게 남는다.", descEn: "Nose: Mysterious Mizunara oak incense with fruit and spice, elegantly blended.\n\nPalate: Japanese finesse harmonizes with the unique character of Mizunara oak.\n\nFinish: Long and mysterious, a gentle echo of incense and spice.", country: { ko: "일본", en: "Japan" }, distillery: { ko: "야마자키 증류소 (산토리)", en: "Yamazaki Distillery (Suntory)" } },
            { name: "로얄살루트 21년", nameEn: "Royal Salute 21 Year", age: "21년", style: "Royal Blend", tags: ["smooth", "sweet", "floral", "classic"], abv: 40, archetype: ["ESTJ", "ESFJ"], priceKrw: 200000, priceRangeKrw: "200,000원 ~ 260,000원", priceUsd: 160, variants: [{vol: "700ml", price: 210000}], desc: "노즈: 우아한 꽃향과 단맛, 부드러운 도자기 같은 질감이 여왕을 위한 품격을 드러낸다.\n\n팔레트: 21년 숙성이 만든 극도로 부드러운 목넘김과 꽃향, 단맛이 우아하게 어우러진다.\n\n피니시: 길고 우아하며 부드러움의 여운이 도자기처럼 오래 지속된다.", descEn: "Nose: Elegant florals and sweetness with a porcelain-like softness fit for a Queen.\n\nPalate: 21 years of maturation bring extreme smoothness with elegant floral sweetness.\n\nFinish: Long and elegant, its softness lingering like fine porcelain.", country: { ko: "스코틀랜드", en: "Scotland" }, distillery: { ko: "시바스브라더스 (페르노리카)", en: "Chivas Brothers (Pernod Ricard)" } },

            { name: "발렌타인 파이니스트", nameEn: "Ballantine's Finest", age: "NAS", style: "Blended Scotch", tags: ["honey", "smooth", "light", "floral"], abv: 40, archetype: ["ESFJ", "ESFP"], priceKrw: 28000, priceRangeKrw: "20,000원 ~ 30,000원", priceUsd: 20, variants: [{vol: "700ml", price: 28000}], desc: "노즈: 꿀과 옅은 꽃향, 가벼운 곡물향이 부드럽게 피어난다.\n\n팔레트: 부드럽고 가벼운 질감에 꿀의 단맛이 은은하게 감돈다.\n\n피니시: 짧고 산뜻하며 데일리로 즐기기 좋다.", descEn: "Nose: Honey and light florals with gentle grain.\n\nPalate: Soft and light with a gentle honeyed sweetness.\n\nFinish: Short and clean, an easy everyday dram.", country: { ko: "스코틀랜드", en: "Scotland" }, distillery: { ko: "시바스브라더스 (페르노리카)", en: "Chivas Brothers (Pernod Ricard)" } },
            { name: "발렌타인 17년", nameEn: "Ballantine's 17 Year", age: "17년", style: "Blended Scotch", tags: ["rich", "smooth", "oak", "honey"], abv: 40, archetype: ["ISFJ", "ENFJ"], priceKrw: 115000, priceRangeKrw: "100,000원 ~ 130,000원", priceUsd: 85, variants: [{vol: "700ml", price: 115000}], desc: "노즈: 오크와 꿀향이 깊이 있게 어우러지며 오랜 숙성의 흔적을 드러낸다.\n\n팔레트: 균형감 있는 부드러움과 오크의 온기, 꿀의 단맛이 조화롭게 퍼진다.\n\n피니시: 중간에서 긴 길이로 오크와 꿀의 여운이 은은하게 이어진다.", descEn: "Nose: Deep oak and honey reveal long maturation.\n\nPalate: Balanced smoothness with warm oak and honeyed sweetness.\n\nFinish: Medium-to-long, a gentle echo of oak and honey.", country: { ko: "스코틀랜드", en: "Scotland" }, distillery: { ko: "시바스브라더스 (페르노리카)", en: "Chivas Brothers (Pernod Ricard)" } },
            { name: "시바스리갈 12년", nameEn: "Chivas Regal 12 Year", age: "12년", style: "Blended Scotch", tags: ["honey", "fruity", "smooth", "vanilla"], abv: 40, archetype: ["ESFJ", "ENFP"], priceKrw: 55000, priceRangeKrw: "48,000원 ~ 60,000원", priceUsd: 42, variants: [{vol: "700ml", price: 55000}], desc: "노즈: 사과와 꿀향이 조화롭게 피어나며 산뜻함을 더한다.\n\n팔레트: 과일향과 꿀의 단맛이 부드러운 질감과 어우러지며 목넘김이 매끄럽다.\n\n피니시: 중간 길이로 사과와 꿀의 여운이 상쾌하게 남는다.", descEn: "Nose: Apple and honey in harmonious freshness.\n\nPalate: Fruity honeyed sweetness with a smooth, easy swallow.\n\nFinish: Medium length, a refreshing echo of apple and honey.", country: { ko: "스코틀랜드", en: "Scotland" }, distillery: { ko: "시바스브라더스 (페르노리카)", en: "Chivas Brothers (Pernod Ricard)" } },
            { name: "시바스리갈 18년", nameEn: "Chivas Regal 18 Year", age: "18년", style: "Blended Scotch", tags: ["rich", "sherry", "smoky", "complex"], abv: 40, archetype: ["INFJ", "INTJ"], priceKrw: 150000, priceRangeKrw: "140,000원 ~ 170,000원", priceUsd: 110, variants: [{vol: "700ml", price: 150000}], desc: "노즈: 건포도와 스모키함, 복합적인 향신료 향이 깊이 있게 피어난다.\n\n팔레트: 18년 숙성의 깊고 복합적인 풍미가 스모키함과 단맛의 균형 속에 펼쳐진다.\n\n피니시: 길고 복합적이며 건포도와 스모키함의 여운이 오래 남는다.", descEn: "Nose: Dried fruit and smoke with complex spice, deeply layered.\n\nPalate: 18 years of depth unfold in balance between smoke and sweetness.\n\nFinish: Long and complex, with a lasting echo of dried fruit and smoke.", country: { ko: "스코틀랜드", en: "Scotland" }, distillery: { ko: "시바스브라더스 (페르노리카)", en: "Chivas Brothers (Pernod Ricard)" } },
            { name: "듀어스 화이트라벨", nameEn: "Dewar's White Label", age: "NAS", style: "Blended Scotch", tags: ["honey", "vanilla", "smooth", "light"], abv: 40, archetype: ["ESFP", "ISFJ"], priceKrw: 32000, priceRangeKrw: "28,000원 ~ 38,000원", priceUsd: 24, variants: [{vol: "700ml", price: 32000}], desc: "노즈: 꿀과 바닐라의 부드러운 단향이 은은하게 피어난다.\n\n팔레트: 부드러운 단맛이 주를 이루며 목넘김이 편안하다.\n\n피니시: 짧고 깔끔하게 마무리되어 니트로도 하이볼로도 무난하다.", descEn: "Nose: Soft honey and vanilla sweetness.\n\nPalate: Gentle sweetness dominates with a comfortable swallow.\n\nFinish: Short and clean, versatile neat or in a highball.", country: { ko: "스코틀랜드", en: "Scotland" }, distillery: { ko: "존 듀어 앤 선즈 (바카디)", en: "John Dewar & Sons (Bacardi)" } },
            { name: "글렌모렌지 오리지널 10년", nameEn: "Glenmorangie Original 10 Year", age: "10년", style: "Highland Single Malt", tags: ["floral", "citrus", "fresh", "fruity"], abv: 40, archetype: ["INFP", "ENFP"], priceKrw: 75000, priceRangeKrw: "65,000원 ~ 85,000원", priceUsd: 55, variants: [{vol: "700ml", price: 75000}], desc: "노즈: 시트러스와 꽃향, 산뜻한 과일향이 우아하게 피어난다.\n\n팔레트: 가장 키가 큰 증류기에서 온 섬세함이 시트러스와 꽃향의 산뜻함으로 이어진다.\n\n피니시: 중간 길이로 시트러스와 꽃향의 여운이 상쾌하게 남는다.", descEn: "Nose: Citrus and florals with fresh fruitiness, elegantly presented.\n\nPalate: Delicacy from the tallest stills carries through as bright citrus and florals.\n\nFinish: Medium length, a refreshing echo of citrus and florals.", country: { ko: "스코틀랜드(하일랜드)", en: "Scotland (Highland)" }, distillery: { ko: "글렌모렌지컴퍼니 (LVMH)", en: "Glenmorangie Co. (LVMH)" } },
            { name: "하이랜드파크 12년", nameEn: "Highland Park 12 Year", age: "12년", style: "Island Single Malt", tags: ["honey", "smoky", "balanced", "rich"], abv: 40, archetype: ["ISFJ", "ISTJ"], priceKrw: 88000, priceRangeKrw: "80,000원 ~ 100,000원", priceUsd: 65, variants: [{vol: "700ml", price: 88000}], desc: "노즈: 오크니의 헤더향과 은은한 스모키함, 꿀향이 조화롭게 피어난다.\n\n팔레트: 헤더의 은은한 향과 스모키함이 꿀의 단맛과 균형 있게 어우러진다.\n\n피니시: 중간에서 긴 길이로 헤더와 꿀의 여운이 부드럽게 이어진다.", descEn: "Nose: Orkney heather with gentle smoke and honey.\n\nPalate: Heather smoke balances beautifully with honeyed sweetness.\n\nFinish: Medium-to-long, a smooth echo of heather and honey.", country: { ko: "스코틀랜드(오크니)", en: "Scotland (Orkney)" }, distillery: { ko: "하이랜드파크 증류소 (에드링턴)", en: "Highland Park Distillery (Edrington)" } },
            { name: "라프로익 10년", nameEn: "Laphroaig 10 Year", age: "10년", style: "Peated Islay", tags: ["smoky", "medicinal", "seaweed", "intense"], abv: 40, archetype: ["ISTJ", "INTJ"], priceKrw: 78000, priceRangeKrw: "70,000원 ~ 88,000원", priceUsd: 60, variants: [{vol: "700ml", price: 78000}], desc: "노즈: 요오드와 해조류향, 강렬한 스모키함이 아일라 피트의 정수를 드러낸다.\n\n팔레트: 강렬한 약품향과 짠맛, 스모키함이 정면으로 부딪히는 개성 강한 맛이다.\n\n피니시: 길고 강렬하며 요오드와 스모키함의 여운이 오래 지속된다.", descEn: "Nose: Iodine and seaweed with intense smoke, quintessential Islay peat.\n\nPalate: A bold clash of medicinal, salty, and smoky character.\n\nFinish: Long and intense, lasting iodine and smoke.", country: { ko: "스코틀랜드(아일라)", en: "Scotland (Islay)" }, distillery: { ko: "라프로익 증류소 (빔산토리)", en: "Laphroaig Distillery (Beam Suntory)" } },
            { name: "보모아 12년", nameEn: "Bowmore 12 Year", age: "12년", style: "Peated Islay", tags: ["smoky", "citrus", "honey", "balanced"], abv: 40, archetype: ["ISFP", "INFJ"], priceKrw: 80000, priceRangeKrw: "72,000원 ~ 90,000원", priceUsd: 62, variants: [{vol: "700ml", price: 80000}], desc: "노즈: 은은한 스모키함과 시트러스, 꿀향이 균형 있게 피어난다.\n\n팔레트: 부드러운 스모키함과 시트러스, 꿀의 단맛이 조화롭게 퍼지는 순한 아일라이다.\n\n피니시: 중간 길이로 스모키함과 꿀의 여운이 부드럽게 이어진다.", descEn: "Nose: Gentle smoke, citrus, and honey in balance.\n\nPalate: Soft smoke meets citrus and honey for a gentler Islay experience.\n\nFinish: Medium length, a smooth echo of smoke and honey.", country: { ko: "스코틀랜드(아일라)", en: "Scotland (Islay)" }, distillery: { ko: "보모아 증류소 (빔산토리)", en: "Bowmore Distillery (Beam Suntory)" } },
            { name: "오첸토션 12년", nameEn: "Auchentoshan 12 Year", age: "12년", style: "Lowland Single Malt", tags: ["light", "citrus", "vanilla", "smooth"], abv: 40, archetype: ["ISFP", "INFP"], priceKrw: 75000, priceRangeKrw: "65,000원 ~ 85,000원", priceUsd: 55, variants: [{vol: "700ml", price: 75000}], desc: "노즈: 가벼운 시트러스와 바닐라향이 산뜻하게 피어난다.\n\n팔레트: 삼중 증류의 부드러운 질감에 시트러스와 바닐라의 단맛이 가볍게 퍼진다.\n\n피니시: 짧고 산뜻하며 시트러스의 여운이 상쾌하게 남는다.", descEn: "Nose: Light citrus and vanilla, fresh and bright.\n\nPalate: Triple-distilled smoothness carries light citrus and vanilla sweetness.\n\nFinish: Short and fresh, a bright citrus echo.", country: { ko: "스코틀랜드(로우랜드)", en: "Scotland (Lowland)" }, distillery: { ko: "오첸토션 증류소 (빔산토리)", en: "Auchentoshan Distillery (Beam Suntory)" } },
            { name: "아벨라워 12년 더블캐스크", nameEn: "Aberlour 12 Year Double Cask", age: "12년", style: "Sherry Cask", tags: ["sherry", "sweet", "chocolate", "spicy"], abv: 40, archetype: ["INFJ", "ISFJ"], priceKrw: 90000, priceRangeKrw: "80,000원 ~ 100,000원", priceUsd: 68, variants: [{vol: "700ml", price: 90000}], desc: "노즈: 진한 셰리향과 초콜릿, 스파이스가 풍성하게 피어난다.\n\n팔레트: 셰리 캐스크 숙성이 만든 진한 초콜릿과 스파이스의 달콤한 조화가 입안 가득 퍼진다.\n\n피니시: 중간에서 긴 길이로 초콜릿과 스파이스의 여운이 달콤하게 남는다.", descEn: "Nose: Rich sherry, chocolate, and spice.\n\nPalate: Sherry-cask maturation brings rich chocolate and spice sweetness.\n\nFinish: Medium-to-long, a sweet echo of chocolate and spice.", country: { ko: "스코틀랜드(스페이사이드)", en: "Scotland (Speyside)" }, distillery: { ko: "아벨라워 증류소 (페르노리카)", en: "Aberlour Distillery (Pernod Ricard)" } },
            { name: "글렌파클라스 12년", nameEn: "Glenfarclas 12 Year", age: "12년", style: "Speyside Single Malt", tags: ["sherry", "rich", "spicy", "oak"], abv: 43, archetype: ["ISTJ", "INTJ"], priceKrw: 85000, priceRangeKrw: "75,000원 ~ 95,000원", priceUsd: 65, variants: [{vol: "700ml", price: 85000}], desc: "노즈: 셰리향과 오크, 스파이스가 묵직하게 피어난다.\n\n팔레트: 가족 경영 증류소 특유의 진한 셰리와 오크의 풍미가 스파이시하게 어우러진다.\n\n피니시: 길고 묵직하며 셰리와 오크의 여운이 진하게 남는다.", descEn: "Nose: Sherry, oak, and spice, robustly presented.\n\nPalate: Rich family-distillery sherry and oak character with spice.\n\nFinish: Long and rich, a deep echo of sherry and oak.", country: { ko: "스코틀랜드(스페이사이드)", en: "Scotland (Speyside)" }, distillery: { ko: "제이앤지그랜트", en: "J&G Grant" } },
            { name: "버나하벤 12년", nameEn: "Bunnahabhain 12 Year", age: "12년", style: "Unpeated Islay", tags: ["maritime", "fruity", "mellow", "sherry"], abv: 46.3, archetype: ["INFP", "ISFJ"], priceKrw: 95000, priceRangeKrw: "85,000원 ~ 105,000원", priceUsd: 72, variants: [{vol: "700ml", price: 95000}], desc: "노즈: 바다내음과 과일향이 부드럽게 어우러지며 피트를 쓰지 않은 아일라의 개성을 드러낸다.\n\n팔레트: 부드러운 바다내음과 과일향, 은은한 셰리가 조화롭게 퍼진다.\n\n피니시: 중간 길이로 바다내음과 과일향의 여운이 부드럽게 이어진다.", descEn: "Nose: Sea air and fruit blend softly, unpeated Islay character.\n\nPalate: Gentle maritime notes meet fruit and hints of sherry.\n\nFinish: Medium length, a soft echo of sea air and fruit.", country: { ko: "스코틀랜드(아일라)", en: "Scotland (Islay)" }, distillery: { ko: "버나하벤 증류소", en: "Bunnahabhain Distillery" } },

            { name: "김창수 위스키", nameEn: "Kim Chang Soo Whisky", age: "NAS", style: "Korean Single Malt", tags: ["unique", "complex", "fruity", "oak"], abv: 53, archetype: ["INTJ", "INFP"], priceKrw: 140000, priceRangeKrw: "120,000원 ~ 160,000원", priceUsd: 105, variants: [{vol: "700ml", price: 140000}], desc: "노즈: 독창적인 과일향과 오크, 복합적인 스파이스향이 강렬하게 피어난다.\n\n팔레트: 53도의 캐스크 스트렝스가 만든 독창적이고 복합적인 풍미가 입안 가득 퍼진다.\n\n피니시: 길고 강렬하며 과일향과 오크의 여운이 오래 남는다.", descEn: "Nose: Unique fruit, oak, and complex spice, intensely presented.\n\nPalate: 53% cask strength delivers unique, complex character.\n\nFinish: Long and intense, lasting fruit and oak.", country: { ko: "한국", en: "Korea" }, distillery: { ko: "김창수 증류소", en: "Kichang Distillery" } },
            { name: "기원", nameEn: "Ki-One", age: "NAS", style: "Korean Single Malt", tags: ["fresh", "fruity", "honey", "unique"], abv: 43, archetype: ["ENFP", "ISFP"], priceKrw: 130000, priceRangeKrw: "110,000원 ~ 150,000원", priceUsd: 95, variants: [{vol: "700ml", price: 130000}], desc: "노즈: 신선한 과일향과 꿀, 독특한 풍미가 상쾌하게 피어난다.\n\n팔레트: 한국의 물과 보리가 만든 신선하고 과일향 가득한 단맛이 입안 가득 퍼진다.\n\n피니시: 중간 길이로 과일향과 꿀의 여운이 상쾌하게 남는다.", descEn: "Nose: Fresh fruit and honey with a distinctive character.\n\nPalate: Korean water and barley bring fresh, fruit-forward sweetness.\n\nFinish: Medium length, a fresh echo of fruit and honey.", country: { ko: "한국", en: "Korea" }, distillery: { ko: "쓰리소사이어티스", en: "Three Societies" } }
        ];

        // --- Helper Logic for Blending & Processing ---
        const getWhiskyDetails = (w) => {
             const fallbackColor = w.style.includes('Bourbon') ? '#d97706' : w.style.includes('Sherry') ? '#78350f' : w.tags.includes('smoky') ? '#b45309' : '#92400e';
             const flavor = {
                 peaty: w.tags.some(t => ['smoky', 'peaty', 'seaweed', 'medicinal'].includes(t)) ? 85 : 10,
                 sweet: w.tags.some(t => ['sweet', 'honey', 'vanilla', 'caramel'].includes(t)) ? 85 : 40,
                 spicy: w.tags.some(t => ['spicy', 'peppery', 'bold', 'intense'].includes(t)) ? 75 : 30,
                 fruity: w.tags.some(t => ['fruity', 'floral', 'citrus', 'sherry'].includes(t)) ? 80 : 40,
                 oaky: w.tags.some(t => ['oak', 'classic', 'balanced', 'rich'].includes(t)) ? 75 : 45,
             };
             return { ...w, color: fallbackColor, flavor };
        };

        const calculateBiorhythm = (mbtiString) => {
            const seed = new Date().getTime() + (mbtiString.split('').reduce((a,c)=>a+c.charCodeAt(0),0) * 100000);
            const cal = (p) => Math.sin((seed / 86400000 / p) * 2 * Math.PI);
            return { physical: Math.round(cal(23)*50+50), emotional: Math.round(cal(28)*50+50), intellectual: Math.round(cal(33)*50+50) };
        };

        const getBlendedMood = (moodIds, currentLang) => {
            if (moodIds.length === 1) {
                const m = MOODS.find(x => x.id === moodIds[0]);
                return { emoji: m.emoji, label: m.label[currentLang], desc: m.desc[currentLang], invite: currentLang === 'ko' ? "그럼 이제 딱 맞는 한 잔을 찾아볼까요?" : "Shall we find the perfect drink?" };
            }
            const has = (id) => moodIds.includes(id);

            if ((has('joy') || has('delight')) && has('anticipation')) return { emoji: "🎊", label: currentLang === 'ko' ? "터질듯한 환희" : "Bursting Euphoria", desc: currentLang === 'ko' ? "설렘과 즐거움이 만나 긍정적인 에너지가 넘쳐흐릅니다." : "Positive energy at an absolute peak.", invite: currentLang === 'ko' ? "기분을 끌어올려줄 축하주, 한 잔 할까요?" : "A celebratory drink?" };

            if (pos > 0 && neg === 0) return { emoji: "✨", label: currentLang === 'ko' ? "긍정의 물결" : "Colorful Positivity", desc: currentLang === 'ko' ? "밝고 좋은 감정들이 시너지를 내며 반짝이고 있습니다." : "Bright emotions are synergizing.", invite: currentLang === 'ko' ? "완벽한 한 잔으로 하루를 마무리해 볼까요?" : "Finish with a perfect drink?" };
            else if (neg > 0 && pos === 0) return { emoji: "🌧️", label: currentLang === 'ko' ? "폭풍우 치는 내면" : "Stormy Inner World", desc: currentLang === 'ko' ? "부정적인 감정들이 얽혀 비바람이 몰아치고 있습니다." : "Negative emotions are tangled.", invite: currentLang === 'ko' ? "당신을 조용히 달래줄 한 잔을 찾아드릴까요?" : "A drink to quietly comfort you?" };
            else return { emoji: "🌓", label: currentLang === 'ko' ? "복잡미묘한 여운" : "Bittersweet Resonance", desc: currentLang === 'ko' ? "상반된 감정들이 교차하며 깊고 복잡한 여운을 남깁니다." : "Contrasting emotions intersect.", invite: currentLang === 'ko' ? "이 감정선에 깊이를 더해줄 한 잔, 골라볼까요?" : "A drink to add depth to these emotions?" };
        };

        // --- 2. UI Components (Premium V2 Theme) ---
        const Icon = ({ name, className = "" }) => {

            const W = 320, H = 80, DAYS = 21;
            const x = (i) => (i / (DAYS-1)) * W;
            const y = (v) => H/2 - v * (H/2 - 8);
            const wavePath = (vTarget) => {
                const pts = Array.from({length:DAYS}, (_,i) => [x(i), y(Math.sin((i/(DAYS-1) * Math.PI * 4) + Math.asin(vTarget)))]);

                        {Object.entries(cycles).map(([k,c]) => (
                            <div key={k} className="flex-1 p-3 rounded-2xl text-center border border-black/5 dark:border-white/5 bg-black/5 dark:bg-white/5">

                                <div className="text-2xl font-black text-slate-800 dark:text-slate-100 playfair">{Math.round((c.v + 1) / 2 * 100)}</div>
                            </div>

                </div>

        const PourAnimation = ({ color, onComplete, theme }) => {
            const [fill, setFill] = useState(0);
            const [stream, setStream] = useState(true);
            const rafRef = useRef(null);
            const isLight = theme === 'light';
            const glassStroke = isLight ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.2)';
            const glassGrad = isLight
                ? [['0%','black',0.02], ['38%','black',0.08], ['100%','black',0.01]]
                : [['0%','white',0.04], ['38%','white',0.15], ['100%','white',0.02]];
            const rimHighlight = isLight ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.1)';

            useEffect(() => {
                let start = null;
                const step = (ts) => {
                    if (!start) start = ts;
                    const p = Math.min((ts - start) / 1400, 1);
                    setFill((1 - Math.pow(1 - p, 3)) * 62);
                    if (p < 1) rafRef.current = requestAnimationFrame(step);
                    else { setStream(false); setTimeout(() => onComplete?.(), 400); }
                };
                rafRef.current = requestAnimationFrame(step);
                return () => cancelAnimationFrame(rafRef.current);
            }, [color]);

            const liquidY = 93 - (fill / 100) * 75;
            return (

                                        <circle cx="126" cy={liquidY-3} r="2.5" fill={color} opacity="0.6"/><circle cx="133" cy={liquidY-5} r="1.5" fill={color} opacity="0.4"/>
                                    </g>
                                )}
                            </g>

                        <path d="M25 14 L22 93 Q22 103 35 103 L145 103 Q158 103 158 93 L155 14 Z" fill="url(#glassBodyGrad)" stroke={glassStroke} strokeWidth="1.5"/>
                        <g clipPath="url(#glassClip)">
                            <rect x="22" y={liquidY} width="136" height={93-liquidY} fill={color} opacity="0.7" />
                            {fill > 3 && <ellipse cx="90" cy={liquidY} rx="62" ry="3" fill={color} opacity="0.4" style={{ animation:'wave 1.8s ease-in-out infinite' }} />}

                                <rect x="66" y="68" width="46" height="30" rx="6" fill="url(#iceG2)" opacity="0.6"/>
                                <rect x="66" y="68" width="46" height="30" rx="6" fill="none" stroke="rgba(255,255,255,0.3)" strokeWidth="0.75"/>
                            </g>

                    </svg>
                    <div style={{ position:'absolute', inset:-16, background:`radial-gradient(circle at 50% 75%, ${color}30 0%, transparent 60%)`, pointerEvents:'none', opacity: fill / 62 }}/>
                </div>

        };

        const ShareCard = ({ result, mbti, lang, onClose }) => {
            const canvasRef = useRef(null);

            const w = result.whiskey;

            useEffect(() => {
                const ctx = canvasRef.current?.getContext('2d');

                const W = 800, H = 1000;

                const bg = ctx.createRadialGradient(W/2, H*0.2, 0, W/2, H*0.2, W*0.8);
                bg.addColorStop(0, '#1e293b'); bg.addColorStop(1, '#080604');
                ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
                const glow = ctx.createRadialGradient(W/2, 200, 0, W/2, 200, 350);
                glow.addColorStop(0, w.color + '50'); glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = '#c8962a'; ctx.font = '500 20px Inter, Pretendard, sans-serif'; ctx.letterSpacing = '8px';
                ctx.fillText('WHISKY × MBTI', W/2 - ctx.measureText('WHISKY × MBTI').width/2, 55);
                ctx.fillStyle = '#f8f8f8'; ctx.font = 'bold 110px Inter, Pretendard, sans-serif'; ctx.textAlign = 'center'; ctx.fillText(mbti, W/2, 220);
                ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = '400 30px Inter, Pretendard, sans-serif'; ctx.fillText(result.blendedMood?.label || 'Daily Pick', W/2, 275);
                ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.moveTo(W*0.2, 320); ctx.lineTo(W*0.8, 320); ctx.stroke();
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 46px Inter, Pretendard, sans-serif'; ctx.fillText(lang==='ko'?w.name:w.nameEn, W/2, 400);
                ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '300 24px Inter, Pretendard, sans-serif'; ctx.fillText(`${w.style}  ·  ${w.abv}%`, W/2, 440);
                
                let tagX = W/2 - (w.tags.length * 130)/2 + 65;
                w.tags.forEach(t => {
                    const tw = ctx.measureText('#' + t).width + 30;
                    ctx.fillStyle = 'rgba(200,150,42,0.15)'; ctx.beginPath(); ctx.roundRect(tagX - tw/2, 470, tw, 36, 18); ctx.fill();
                    ctx.fillStyle = '#c8962a'; ctx.font = '400 20px Inter, Pretendard, sans-serif'; ctx.fillText('#' + t, tagX, 495);
                    tagX += 140;
                });
            }, [result, lang]);

            const copy = () => {

                });
            };

            return (
                <div className="fixed inset-0 z-[1000] bg-black/80 backdrop-blur-md flex flex-col items-center justify-center p-6 animate-in fade-in" onClick={onClose}>
                    <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-[32px] p-6 w-full max-w-sm flex flex-col gap-5 shadow-2xl" onClick={e=>e.stopPropagation()}>

        // --- 3. Screens ---

        const Onboarding = ({ onStartQuiz, onDirectSelect, lang }) => (
            <div className="flex flex-col h-full pt-[calc(env(safe-area-inset-top,48px)+32px)] p-8 animate-in slide-in-from-bottom-8 duration-500">
                <div className="flex-1 flex flex-col justify-center items-center text-center">
                    <div className="w-28 h-28 bg-[#c8962a]/10 rounded-full flex items-center justify-center mb-10 border border-[#c8962a]/20 shadow-[0_0_30px_rgba(200,150,42,0.15)]">
                        <Icon name="compass" className="w-12 h-12 text-[#c8962a]" />

        const Quiz = ({ onComplete, lang }) => {
            const [qIdx, setQIdx] = useState(0);

            const handleAnswer = (val) => {
                const newScores = { ...scores, [val]: scores[val] + 1 };
                setScores(newScores);
                if (qIdx < QUIZ_QUESTIONS.length - 1) setQIdx(qIdx + 1);
                else {
                    const mbti = (newScores.E >= newScores.I ? 'E' : 'I') + (newScores.N >= newScores.S ? 'N' : 'S') + (newScores.T >= newScores.F ? 'T' : 'F') + (newScores.J >= newScores.P ? 'J' : 'P');

            return (

                                        <span className="font-bold text-lg">{type}</span>
                                    </button>
                                ))}
                            </div>

                    ))}

            </div>
        );

        // --- Main Tabs ---

        const HomeTab = ({ mbti, lang, theme }) => {
            const group = MBTI_GROUPS.find(g => g.types.includes(mbti));
            const bio = useMemo(() => calculateBiorhythm(mbti), [mbti]);
            
            const dailyPick = useMemo(() => {
                let available = SPIRITS_DB;
                const scored = available.map(w => {
                    let score = 0;
                    if (w.archetype && w.archetype.includes(mbti)) score += 100;
                    mbti.split('').forEach(trait => {
                        const prefs = MBTI_TRAIT_PREFS[trait] || [];
                        w.tags.forEach(tag => { if (prefs.includes(tag)) score += 30; });
                    });
                    const avgBio = (bio.physical + bio.emotional + bio.intellectual) / 3;
                    if (avgBio > 65 && w.abv >= 50) score += 50;
                    if (avgBio < 35 && w.abv <= 43) score += 50;
                    return { ...getWhiskyDetails(w), score };
                }).sort((a,b) => b.score - a.score);
                return scored[0];
            }, [mbti, bio]);

            return (
                <div className="space-y-8 animate-in fade-in pt-[calc(env(safe-area-inset-top,48px)+24px)]">
                    <div className="flex items-center justify-between px-2">
                        <div>
                            <p className="text-slate-500 dark:text-slate-400 text-base mb-1.5">{lang==='en'?'Welcome back,':'안녕하세요,'}</p>
                            <h2 className="max-[375px]:text-[1.8rem] text-[2.2rem] font-black text-slate-900 dark:text-white whitespace-nowrap tracking-tighter">
                                <span className={group.color}>{mbti}</span> {group.label[lang]}
                            </h2>
                        </div>
                        <div className="w-14 h-14 rounded-full bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 flex items-center justify-center text-3xl shadow-lg">🥃</div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 lg:items-stretch">
                        <GlassCard className="p-6 h-full flex flex-col">
                            <div className="flex justify-between items-center mb-6 px-1">
                                <h3 className="font-bold text-slate-900 dark:text-white flex items-center gap-2 text-lg"><Icon name="activity" className="w-5 h-5 text-[#c8962a]"/> {TEXT[lang].result_bio}</h3>
                            </div>
                            <WaveChart bio={bio} lang={lang} theme={theme} />
                        </GlassCard>

                        <div className="pb-4 flex flex-col">
                            <h3 className="font-bold text-slate-600 dark:text-slate-300 mb-4 px-2 text-lg">{lang==='en'?"Today's Daily Pick":"오늘의 데일리 픽"}</h3>
                            <GlassCard className="p-5 flex-1 flex flex-col">
                                <div className="flex gap-5 items-center">
                                    <div className="w-20 h-24 rounded-2xl flex items-center justify-center shrink-0 shadow-inner" style={{ background: `linear-gradient(135deg, ${dailyPick.color}90, ${dailyPick.color}50)` }}>
                                        <Icon name="glass-water" className="w-10 h-10 text-slate-900/90 dark:text-white/90" />
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-sm text-[#c8962a] font-bold mb-1.5 uppercase tracking-wide">{dailyPick.style} · {dailyPick.abv}%</p>
                                        <h4 className="text-[1.35rem] font-bold text-slate-900 dark:text-white mb-2 leading-tight">{lang==='ko'?dailyPick.name:dailyPick.nameEn}</h4>
                                        <p className="text-sm text-slate-500 dark:text-slate-400 line-clamp-2 leading-relaxed">{lang==='ko'?dailyPick.desc:dailyPick.descEn}</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2 mt-4 pt-4 border-t border-black/5 dark:border-white/10 text-xs text-slate-500 dark:text-slate-400">
                                    <Icon name="map-pin" className="w-3.5 h-3.5" />
                                    <span>{lang==='ko' ? dailyPick.country.ko : dailyPick.country.en}</span>
                                    <span>·</span>
                                    <span>{lang==='ko' ? dailyPick.distillery.ko : dailyPick.distillery.en}</span>
                                    {dailyPick.age !== 'NAS' && (<><span>·</span><span>{dailyPick.age}</span></>)}
                                </div>
                                <button
                                    onClick={() => window.open(`https://www.google.com/search?q=${encodeURIComponent((lang==='ko'?dailyPick.name:dailyPick.nameEn) + ' 위스키')}`, '_blank')}
                                    className="w-full mt-3 py-3 rounded-2xl bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 text-[#c8962a] font-bold text-sm hover:bg-slate-200 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2"
                                >
                                    <Icon name="shopping-bag" className="w-4 h-4" />
                                    {TEXT[lang].buy_btn}
                                </button>
                            </GlassCard>
                        </div>
                    </div>
                </div>
            );
        };

        const CurateTab = ({ mbti, lang, bio, theme }) => {
            const t = TEXT[lang];
            const [cStep, setCStep] = useState(1);
            const [moods, setMoods] = useState([]);
            const [price, setPrice] = useState(1);
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [showShare, setShowShare] = useState(false);

            const run = () => {
                setLoading(true);
                const avgBio = (bio.physical + bio.emotional + bio.intellectual) / 3;
                let abvTarget = "Standard"; if (avgBio > 65) abvTarget = "High"; if (avgBio < 35) abvTarget = "Low"; 
                const range = PRICE_RANGES.find(r => r.id === price);
                let available = SPIRITS_DB.filter(w => w.priceKrw >= range.min && w.priceKrw <= range.max);
                if (available.length === 0) available = SPIRITS_DB;

                const scored = available.map(w => {
                    let s = 0;
                    if (w.priceKrw < range.min || w.priceKrw > range.max) s -= 5000;
                    if (w.archetype && w.archetype.includes(mbti)) s += 300;
                    mbti.split('').forEach(trait => { (MBTI_TRAIT_PREFS[trait]||[]).forEach(tag => { if (w.tags.includes(tag)) s += 60; }); });
                    moods.forEach(mid => { const mD = MOODS.find(m => m.id === mid); w.tags.forEach(tag => { if (mD.flavorProfile.includes(tag)) s += 150; }); });
                    if (abvTarget === "High") s += (w.abv >= 50 ? 200 : -100); else if (abvTarget === "Low") s += (w.abv <= 43 ? 200 : -150); else s += (w.abv >= 40 && w.abv < 50 ? 100 : 0);
                    return { ...getWhiskyDetails(w), score: s };
                }).sort((a, b) => b.score - a.score);

                setTimeout(() => {
                    setResult({ whiskey: scored[0], blendedMood: getBlendedMood(moods, lang) });
                    setCStep(4); setLoading(false);
                }, 2000);
            };

            if (loading) return <LoadingScreen lang={lang} />;

            if (cStep === 1) return (
                <div className="space-y-8 animate-in fade-in slide-in-from-right-4 pt-[calc(env(safe-area-inset-top,48px)+24px)] flex-1 flex flex-col">
                    <header className="px-2">
                        <h2 className="max-[375px]:text-[1.1rem] text-[1.35rem] font-extrabold text-slate-900 dark:text-white leading-tight whitespace-nowrap tracking-tighter">{t.step2_title}</h2>
                        <p className="text-slate-500 dark:text-slate-400 text-base mt-2">{t.step2_sub}</p>
                    </header>
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4 pb-6 flex-1">
                        {MOODS.map(m => (
                            <button key={m.id} onClick={() => setMoods(p => p.includes(m.id) ? p.filter(id=>id!==m.id) : p.length<3 && !MOODS.find(x=>x.id===m.id).conflicts.some(c=>p.includes(c)) ? [...p, m.id] : p)}
                                className={`rounded-[24px] border-2 flex flex-col items-center justify-center text-center p-4 transition-all ${moods.includes(m.id) ? 'border-[#c8962a] bg-[#c8962a]/20 shadow-lg' : 'border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800'}`}>
                                <div className="text-[2.8rem] mb-2 drop-shadow-md">{m.emoji}</div>
                                <div className="w-full flex-1 flex items-center justify-center"><span className={`text-[12.5px] font-bold leading-snug break-keep ${moods.includes(m.id)?'text-[#eac266]':'text-slate-600 dark:text-slate-300'}`}>{m.expr[lang]}</span></div>
                            </button>
                        ))}
                    </div>
                    <div className="pt-4 sticky bottom-0 bg-[var(--bg)]">
                        <button onClick={() => setCStep(2)} disabled={moods.length===0} className={`w-full py-5 rounded-[20px] bg-[#c8962a] text-white font-bold text-xl shadow-xl shadow-[#c8962a]/30 ${moods.length===0?'opacity-50 grayscale cursor-not-allowed':'hover:bg-[#b08020]'}`}>{t.step_next}</button>
                    </div>
                </div>
            );

            if (cStep === 2) {
                const bM = getBlendedMood(moods, lang);
                return (
                    <div className="space-y-8 animate-in fade-in slide-in-from-right-4 pt-[calc(env(safe-area-inset-top,48px)+24px)] flex-1 flex flex-col">
                        <header className="text-center">
                            <h2 className="max-[375px]:text-[1.4rem] text-[1.75rem] font-extrabold text-slate-900 dark:text-white whitespace-nowrap tracking-tighter">{t.step3_title}</h2>
                            <p className="text-slate-500 dark:text-slate-400 text-base mt-2">{t.step3_sub}</p>
                        </header>
                        <div className="flex-1 flex flex-col justify-center">
                            <GlassCard className="flex flex-col items-center gap-5 p-10 w-full mt-8">
                                <div className="text-[6rem] drop-shadow-2xl mb-4">{bM.emoji}</div>
                                <span className="text-4xl font-black text-[#c8962a] text-center">{bM.label}</span>
                                <span className="text-base text-slate-600 dark:text-slate-300 text-center font-medium mt-3 leading-relaxed">{bM.desc}</span>
                                <div className="mt-6 pt-6 border-t-2 border-black/10 dark:border-white/10 w-full text-center"><span className="text-lg font-extrabold text-[#eac266]">{bM.invite}</span></div>
                            </GlassCard>
                        </div>
                        <div className="flex gap-4 mt-10 sticky bottom-0 bg-[var(--bg)] pt-4">
                            <button onClick={()=>setCStep(1)} className="flex-1 py-5 border-2 border-slate-200 dark:border-slate-700 rounded-[20px] text-slate-600 dark:text-slate-300 font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">뒤로</button>
                            <button onClick={()=>setCStep(3)} className="flex-1 py-5 bg-[#c8962a] rounded-[20px] text-white font-bold text-lg shadow-xl shadow-[#c8962a]/30 hover:bg-[#b08020]">계속하기</button>
                        </div>
                    </div>
                );
            }

            if (cStep === 3) return (
                <div className="space-y-8 animate-in fade-in slide-in-from-right-4 pt-[calc(env(safe-area-inset-top,48px)+24px)] flex-1 flex flex-col">
                    <header className="px-2"><h2 className="max-[375px]:text-[1.4rem] text-[1.75rem] font-extrabold text-slate-900 dark:text-white whitespace-nowrap tracking-tighter">{t.step4_title}</h2></header>
                    <div className="flex-1 flex flex-col justify-center gap-10 px-2">
                        <div className="flex flex-col items-center gap-3">
                            <div className={`p-4 rounded-full bg-[#c8962a]/20 text-[#c8962a]`}><Icon name="credit-card" className="w-7 h-7"/></div>
                            <span className="font-black text-3xl text-[#c8962a] text-center">{PRICE_RANGES.find(r=>r.id===price).label[lang]}</span>
                        </div>
                        <input
                            type="range"
                            min="1"
                            max={PRICE_RANGES.length}
                            step="1"
                            value={price}
                            onChange={(e) => setPrice(Number(e.target.value))}
                            className="price-slider"
                            style={{ background: `linear-gradient(to right, #c8962a 0%, #c8962a ${((price-1)/(PRICE_RANGES.length-1))*100}%, var(--border) ${((price-1)/(PRICE_RANGES.length-1))*100}%, var(--border) 100%)` }}
                        />
                        <div className="flex justify-between px-1">
                            <span className="text-sm font-bold text-slate-500 dark:text-slate-400">{PRICE_RANGES[0].label[lang]}</span>
                            <span className="text-sm font-bold text-slate-500 dark:text-slate-400">{PRICE_RANGES[PRICE_RANGES.length-1].label[lang]}</span>
                        </div>
                        <div className="flex justify-between px-[10px]">
                            {PRICE_RANGES.map(r => (
                                <button key={r.id} onClick={()=>setPrice(r.id)} aria-label={r.label[lang]} className={`w-3 h-3 rounded-full transition-all ${price===r.id?'bg-[#c8962a] scale-125':'bg-slate-300 dark:bg-slate-600'}`}></button>
                            ))}
                        </div>
                    </div>
                    <div className="flex gap-4 mt-10 sticky bottom-0 bg-[var(--bg)] pt-4">
                        <button onClick={()=>setCStep(2)} className="flex-1 py-5 border-2 border-slate-200 dark:border-slate-700 rounded-[20px] text-slate-600 dark:text-slate-300 font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">뒤로</button>
                        <button onClick={run} className="flex-[2] py-5 bg-[#c8962a] rounded-[20px] text-white font-bold text-lg shadow-xl shadow-[#c8962a]/30 hover:bg-[#b08020]">{t.run_btn}</button>
                    </div>
                </div>
            );

            if (cStep === 4 && result) return (
                <div className="space-y-8 animate-in zoom-in-95 duration-500 pt-[calc(env(safe-area-inset-top,48px)+16px)]">
                    {showShare && <ShareCard result={result} mbti={mbti} lang={lang} onClose={() => setShowShare(false)} />}
                    <div className="flex justify-between items-center px-4">
                        <button onClick={() => { setCStep(1); setMoods([]); }} className="text-[#c8962a] text-base font-bold flex items-center gap-1.5 bg-[#c8962a]/10 px-4 py-2 rounded-full"><Icon name="rotate-ccw" className="w-4 h-4"/> 다시 큐레이션</button>
                        <button onClick={() => setShowShare(true)} className="text-[#c8962a] text-base font-bold flex items-center gap-1.5 bg-[#c8962a]/10 px-4 py-2 rounded-full"><Icon name="share" className="w-4 h-4"/> 공유하기</button>
                    </div>
                    <div className="text-center relative pt-4">
                        <div className="flex justify-center min-h-[180px]"><PourAnimation color={result.whiskey.color} theme={theme} /></div>
                        <h2 className="text-[2.2rem] font-black mt-6 text-slate-900 dark:text-white px-4 leading-tight">{lang==='ko'?result.whiskey.name:result.whiskey.nameEn}</h2>
                        <p className="text-slate-500 dark:text-slate-400 font-bold mt-2 text-base">{result.whiskey.style} · <span className="text-[#eac266]">{result.whiskey.abv}%</span></p>
                    </div>
                    <div className="flex justify-center flex-wrap gap-2.5 px-4 pb-2">
                        {result.whiskey.tags.map(tag => <span key={tag} className="px-4 py-1.5 bg-black/5 dark:bg-white/5 border border-black/10 dark:border-white/10 text-[#c8962a] rounded-full text-xs font-bold uppercase tracking-widest">#{tag}</span>)}
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 lg:items-stretch">
                        <GlassCard className="p-8 h-full flex flex-col">
                            <h3 className="text-sm font-bold text-[#c8962a] mb-4 uppercase tracking-widest flex items-center gap-2"><Icon name="book-open" className="w-5 h-5"/> Tasting Notes</h3>
                            <p className="text-base text-slate-700 dark:text-slate-200 leading-relaxed font-medium whitespace-pre-line">{lang==='ko'?result.whiskey.desc:result.whiskey.descEn}</p>
                        </GlassCard>
                        <GlassCard className="p-8 h-full flex flex-col">
                            <h3 className="text-sm font-bold text-[#c8962a] mb-6 uppercase tracking-widest flex items-center gap-2"><Icon name="bar-chart-2" className="w-5 h-5"/> Flavor Profile</h3>
                            <FlavorBars flavor={result.whiskey.flavor} lang={lang} />
                        </GlassCard>
                    </div>
                    <div className="pt-2 pb-6">
                        <button
                            onClick={() => window.open(`https://www.google.com/search?q=${encodeURIComponent(result.whiskey.name + ' 위스키')}`, '_blank')}
                            className="w-full py-4 rounded-[20px] bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 text-[#c8962a] font-bold text-lg hover:bg-slate-200 dark:hover:bg-slate-700 hover:border-[#c8962a]/50 transition-all flex items-center justify-center gap-2 shadow-lg"
                        >
                            <Icon name="shopping-bag" className="w-5 h-5" />
                            {t.buy_btn}
                        </button>
                    </div>
                </div>
            );
        };

        const ProfileTab = ({ mbti, lang, onReset, setLang, theme, setTheme }) => {
            const group = MBTI_GROUPS.find(g => g.types.includes(mbti));
            return (
                <div className="space-y-8 animate-in fade-in pt-[calc(env(safe-area-inset-top,48px)+24px)] flex-1 flex flex-col">
                    <h2 className="text-3xl font-extrabold text-slate-900 dark:text-white mb-8 px-2">{lang === 'en' ? 'Profile' : '프로필'}</h2>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 lg:items-start flex-1">
                        <GlassCard className="p-10 flex flex-col items-center text-center">
                            <div className="w-24 h-24 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-6 border-2 border-slate-200 dark:border-slate-700 text-4xl">
                                👤
                            </div>
                            <h3 className={`text-4xl font-black mb-2 ${group?.color || 'text-slate-900 dark:text-white'}`}>{mbti}</h3>
                            <p className="text-sm font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">
                                {group ? group.label[lang] : 'Unknown'}
                            </p>
                        </GlassCard>

                        <div className="flex flex-col gap-4">
                            <button
                                onClick={() => setLang(l => l === 'ko' ? 'en' : 'ko')}
                                className="w-full py-5 rounded-[20px] bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white font-bold text-lg border-2 border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                                {lang === 'en' ? '한국어로 변경' : 'Change to English'}
                            </button>

                            <button
                                onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
                                className="w-full py-5 rounded-[20px] bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white font-bold text-lg border-2 border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                                {theme === 'dark' ? (lang === 'en' ? 'Switch to Light Mode' : '라이트 모드로 변경') : (lang === 'en' ? 'Switch to Dark Mode' : '다크 모드로 변경')}
                            </button>

                            <button
                                onClick={onReset}
                                className="w-full py-5 rounded-[20px] bg-red-900/20 text-red-400 font-bold text-lg border-2 border-red-900/30 hover:bg-red-900/40 transition-colors">
                                {lang === 'en' ? 'Reset MBTI Profile' : '프로필 초기화 (다시하기)'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- 4. Main App Component & Render ---

        const App = () => {
            const [appState, setAppState] = useState('splash'); // splash, onboard, quiz, direct, main
            const [mbti, setMbti] = useState(null);
            const [lang, setLang] = useState('ko');
            const [theme, setTheme] = useState('dark');
            const [activeTab, setActiveTab] = useState('home'); // home, curate, profile

            useEffect(() => {
                const savedMbti = safeStorage.getItem('whiskey_mbti');
                const savedLang = safeStorage.getItem('whiskey_lang');
                const savedTheme = safeStorage.getItem('whiskey_theme');
                if (savedLang) setLang(savedLang);
                if (savedMbti) {
                    setMbti(savedMbti);
                }
                if (savedTheme) setTheme(savedTheme);
                else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) setTheme('light');
            }, []);

            useEffect(() => {
                safeStorage.setItem('whiskey_lang', lang);
            }, [lang]);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', theme === 'dark');
                safeStorage.setItem('whiskey_theme', theme);
            }, [theme]);

            const handleMbtiComplete = (result) => {
                setMbti(result);
                safeStorage.setItem('whiskey_mbti', result);
                setAppState('main');
            };

            const handleReset = () => {
                setMbti(null);
                safeStorage.removeItem('whiskey_mbti');
                setAppState('onboard');
                setActiveTab('home');
            };

            return appState !== 'main' ? (
                <div className="onboarding-shell">
                    <div className="onboarding-brand-panel">
                        <div className="text-[4rem] mb-6">🥃</div>
                        <h1 className="playfair text-4xl font-black text-slate-900 dark:text-white tracking-widest mb-4">WHISKY MBTI</h1>
                        <h2 className="text-2xl font-bold text-slate-700 dark:text-slate-200 mb-4">{TEXT[lang].onboard_title}</h2>
                        <p className="text-slate-500 dark:text-slate-400 text-lg leading-relaxed whitespace-pre-line max-w-md">{TEXT[lang].onboard_sub}</p>
                    </div>
                    <div className="app-container">
                        {appState === 'splash' && <Splash onFinish={() => {
                            const savedMbti = safeStorage.getItem('whiskey_mbti');
                            setAppState(savedMbti ? 'main' : 'onboard');
                        }} />}

                        {appState === 'onboard' && (
                            <Onboarding
                                onStartQuiz={() => setAppState('quiz')}
                                onDirectSelect={() => setAppState('direct')}
                                lang={lang}
                            />
                        )}

                        {appState === 'quiz' && <Quiz onComplete={handleMbtiComplete} lang={lang} />}

                        {appState === 'direct' && (
                            <DirectSelect
                                onComplete={handleMbtiComplete}
                                lang={lang}
                                onBack={() => setAppState('onboard')}
                            />
                        )}
                    </div>
                </div>
            ) : (
                <div className="app-container is-main">
                    <nav className="desktop-nav">
                        <div className="desktop-nav-brand">
                            <span className="text-xl">🥃</span>
                            <span className="playfair font-bold text-lg text-slate-900 dark:text-white">{TEXT[lang].title}</span>
                        </div>
                        <div className="nav-menu">
                            <button className={`nav-menu-item ${activeTab === 'home' ? 'active' : ''}`} onClick={() => setActiveTab('home')}>
                                <Icon name="home" className="w-4 h-4" />
                                <span>{TEXT[lang].tab_home}</span>
                            </button>
                            <button className={`nav-menu-item ${activeTab === 'curate' ? 'active' : ''}`} onClick={() => setActiveTab('curate')}>
                                <Icon name="glass-water" className="w-4 h-4" />
                                <span>{TEXT[lang].tab_curate}</span>
                            </button>
                            <button className={`nav-menu-item ${activeTab === 'profile' ? 'active' : ''}`} onClick={() => setActiveTab('profile')}>
                                <Icon name="user" className="w-4 h-4" />
                                <span>{TEXT[lang].tab_profile}</span>
                            </button>
                        </div>
                    </nav>

                    <div className="content-area hide-scroll">
                        {activeTab === 'home' && <HomeTab mbti={mbti} lang={lang} theme={theme} />}
                        {activeTab === 'curate' && <CurateTab mbti={mbti} lang={lang} bio={calculateBiorhythm(mbti)} theme={theme} />}
                        {activeTab === 'profile' && <ProfileTab mbti={mbti} lang={lang} onReset={handleReset} setLang={setLang} theme={theme} setTheme={setTheme} />}
                    </div>

                    <nav className="bottom-nav">
                        <button className={`nav-item ${activeTab === 'home' ? 'active' : ''}`} onClick={() => setActiveTab('home')}>
                            <Icon name="home" className="w-6 h-6" />
                            <span className="text-[10px] font-bold">{TEXT[lang].tab_home}</span>
                        </button>
                        <button className={`nav-item ${activeTab === 'curate' ? 'active' : ''}`} onClick={() => setActiveTab('curate')}>
                            <Icon name="glass-water" className="w-6 h-6" />
                            <span className="text-[10px] font-bold">{TEXT[lang].tab_curate}</span>
                        </button>
                        <button className={`nav-item ${activeTab === 'profile' ? 'active' : ''}`} onClick={() => setActiveTab('profile')}>
                            <Icon name="user" className="w-6 h-6" />
                            <span className="text-[10px] font-bold">{TEXT[lang].tab_profile}</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
